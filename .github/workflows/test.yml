name: API Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  python-tests:
    name: Python – FastAPI integration tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mongodb://localhost:27017/sgarden
      PORT: 4000
      SERVER_SECRET: sgarden-secret-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        working-directory: python
        run: pip install -r requirements.txt

      - name: Start FastAPI server
        working-directory: python
        run: |
          uvicorn main:app --host 0.0.0.0 --port 4000 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 4000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: Run integration tests
        run: |
          chmod +x test.sh
          ./test.sh http://localhost:4000

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
